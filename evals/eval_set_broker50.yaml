- description: schmuck_abhandenkommen_einbruch_raub
  vars:
    question: Besteht beim Abhandenkommen außerhalb des Tragens stets Versicherungsschutz
      oder nur bei Einbruchdiebstahl und Raub?
    expected_intent: COVERAGE_QUERY
    expected_sparte: Schmuck
    language: de
    notes: Bei Aufbewahrung im Gebäude nur Einbruchdiebstahl und Raub gedeckt
  assert:
  - type: javascript
    value: output.length > 0
  - type: icontains-any
    value:
    - Einbruchdiebstahl
    - Raub
  - type: not-icontains
    value: Traceback

# ============================================================
# F. Cross-Produkt-Beratung & Deckungslücken (39-50)
# ============================================================

- description: cross_schmuck_ueber_hausrat_sublimit
  vars:
    question: Ein Kunde besitzt Schmuck für 80.000 Euro. Reicht das Sublimit der Hausratversicherung
      oder braucht er eine separate Schmuckversicherung und welche Mehrleistung bringt diese?
    expected_intent: COMPARISON
    expected_sparte: Schmuck
    language: de
    notes: Hausrat-Schmuck-Sublimit 30.000 Euro vs. Schmuckpolice weltweit/höhere Grenzen
  assert:
  - type: javascript
    value: output.length > 0
  - type: icontains-any
    value:
    - 30.000 Euro
    - weltweit
    - Wertschutzschränke
  - type: not-icontains
    value: Traceback

- description: cross_glas_separat_vs_hausrat
  vars:
    question: Wann lohnt sich eine separate Glasversicherung zusätzlich zur Hausratversicherung
      und welche Glasschäden deckt die Hausrat nicht ab?
    expected_intent: COMPARISON
    expected_sparte: Glas
    language: de
    notes: Abgrenzung Glasversicherung (Verglasung) vs. Hausrat-Deckung
  assert:
  - type: javascript
    value: output.length > 0
  - type: icontains-any
    value:
    - Verglasung
    - Glasversicherung
    - Hausrat
  - type: not-icontains
    value: Traceback

- description: cross_smart_ebike_empfehlung
