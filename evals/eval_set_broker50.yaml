# ERGO P&C Agent-Bot — eval_set_broker50.yaml
# 50 high-value broker / sales-partner questions grounded in sources/output_md.
# GENERATED BY LLM — REVIEW REQUIRED
# Schema mirrors eval_set.yaml (description / vars / assert).
# Intents:  COVERAGE_QUERY | EXCLUSION_QUERY | COMPARISON | CLAIMS_PROCEDURE | PRICE_QUOTE | GENERAL_INFO | OUT_OF_SCOPE
# Sparten:  Kfz | Hausrat | Glas | Schmuck | null
# Keywords in icontains-any are verified substrings of the source markdown
#   (OCR-broken fl/fi ligature words avoided, e.g. "Haftpfl icht").
# Reviewer checklist:
#   1. question realistic for a German agent
#   2. expected_keywords actually present in source conditions
#   3. expected_intent / expected_sparte / expected_tarif correct
# REVIEWED: false

