    expected_sparte: Kfz
    language: de
    notes: Safe Drive Aktivierungs- und Ausschlussbedingungen (App, SEPA, 30 Tage)
  assert:
  - type: javascript
    value: output.length > 0
  - type: icontains-any
    value:
    - Safe Drive
    - SEPA
    - App
  - type: not-icontains
    value: Traceback

