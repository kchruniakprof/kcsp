    expected_sparte: Hausrat
    expected_tarif: Smart
    language: de
    notes: Smart Vorsorgeschutz deckt nur Neuanschaffung; Best bzw. Fahrraddiebstahl-Baustein nötig
  assert:
  - type: javascript
    value: output.length > 0
  - type: icontains-any
    value:
    - Vorsorgeschutz
    - 500 Euro
    - Best
  - type: not-icontains
    value: Traceback

