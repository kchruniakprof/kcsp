version: "3.9"
services:
  kcsp-app:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    expose:
      - "8000"
    volumes:
      - kcsp_data:/data
    env_file:
      - .env.kcsp
    networks:
      - dkv_belgium_v3_default
    command: ["uvicorn", "webapp.backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--root-path", "/kcsp"]
    restart: unless-stopped

volumes:
  kcsp_data:

networks:
  dkv_belgium_v3_default:
    external: true
